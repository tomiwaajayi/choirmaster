name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck

      - run: pnpm build

      - name: Syntax-check shell completions
        run: |
          set -euo pipefail

          bash_file="$(mktemp)"
          zsh_file="$(mktemp)"

          node packages/cli/dist/cli.js completions bash > "$bash_file"
          bash -n "$bash_file"

          node packages/cli/dist/cli.js completions zsh > "$zsh_file"
          if command -v zsh >/dev/null 2>&1; then
            zsh -n "$zsh_file"
          else
            echo "zsh is not installed; skipping zsh syntax check"
          fi

      - run: pnpm test

      - name: Smoke test packed package
        run: |
          set -euo pipefail

          cd packages/cli
          pack_dir="$(mktemp -d)"
          tarball="$(npm pack --silent --pack-destination "$pack_dir")"
          tarball_path="$pack_dir/$tarball"
          tar -tf "$tarball_path" > "$pack_dir/files.txt"

          grep -Fxq "package/package.json" "$pack_dir/files.txt"
          grep -Fxq "package/README.md" "$pack_dir/files.txt"
          grep -Fxq "package/LICENSE" "$pack_dir/files.txt"
          grep -Fxq "package/dist/cli.js" "$pack_dir/files.txt"
          grep -Fxq "package/dist/index.js" "$pack_dir/files.txt"
          grep -Fxq "package/dist/index.d.ts" "$pack_dir/files.txt"

          tar -xOf "$tarball_path" package/package.json > "$pack_dir/package.json"
          PACKED_PACKAGE_JSON="$pack_dir/package.json" node --input-type=module <<'NODE'
          import { readFileSync } from 'node:fs'

          const pkg = JSON.parse(readFileSync(process.env.PACKED_PACKAGE_JSON, 'utf8'))
          if (pkg.name !== 'choirmaster') {
            throw new Error(`expected packed package name choirmaster, got ${pkg.name}`)
          }

          if (pkg.bin?.choirmaster !== 'dist/cli.js' || pkg.bin?.cm !== 'dist/cli.js') {
            throw new Error(`expected packed package to expose choirmaster and cm bins`)
          }

          const runtimeDeps = Object.keys(pkg.dependencies ?? {})
          const leakedWorkspaceDeps = runtimeDeps.filter((name) => name.startsWith('@choirmaster/'))
          if (leakedWorkspaceDeps.length > 0) {
            throw new Error(`packed package has scoped runtime deps: ${leakedWorkspaceDeps.join(', ')}`)
          }
          NODE

          smoke_dir="$(mktemp -d)"
          cd "$smoke_dir"
          npm init -y >/dev/null
          npm install "$tarball_path" >/dev/null
          npx choirmaster --version
          npx cm --version
          git init -b main >/dev/null
          git config user.email test@example.com
          git config user.name Test
          npx cm init >/dev/null
          cat > .choirmaster/manifest.ts <<'EOF'
          import { defineProject, perTaskMerge, worktreeSandbox } from 'choirmaster'

          const fakeAgent = (name) => ({
            name: `fake:${name}`,
            engine: 'fake',
            model: name,
            async invoke() {
              throw new Error('not used by CI smoke')
            },
          })

          export default defineProject({
            base: 'main',
            agents: {
              planner: fakeAgent('planner'),
              implementer: fakeAgent('implementer'),
              reviewer: fakeAgent('reviewer'),
            },
            gates: [],
            branchPolicy: perTaskMerge(),
            sandbox: worktreeSandbox(),
            prompts: {
              planner: '.choirmaster/prompts/planner.md',
              planReviewer: '.choirmaster/prompts/plan-reviewer.md',
              implementer: '.choirmaster/prompts/implementer.md',
              reviewer: '.choirmaster/prompts/reviewer.md',
            },
            forbiddenPaths: ['.env', '.env.*'],
            strictInstructions: [],
          })
          EOF
          git add -A
          git commit -m initial >/dev/null
          npx cm doctor --skip-network
